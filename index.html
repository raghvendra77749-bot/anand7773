<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAGHAV EDITZ | REEL SAVER PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');

        body {
            margin: 0; background: #050505; color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .container {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(25px);
            padding: 40px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        h1 {
            font-weight: 900; font-size: 24px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #bc1888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        input {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid #333; background: #000; color: #fff;
            box-sizing: border-box; outline: none; margin-bottom: 20px;
        }

        .download-btn {
            background: linear-gradient(45deg, #f09433, #bc1888);
            color: white; border: none; padding: 15px;
            border-radius: 12px; font-weight: 900; cursor: pointer;
            width: 100%; transition: 0.3s;
        }

        #result { margin-top: 25px; display: none; padding: 20px; border: 1px dashed #444; border-radius: 15px; }

        .loader {
            display: none; border: 3px solid #333; border-top: 3px solid #bc1888;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 20px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>REEL DOWNLOADER</h1>
        <input type="text" id="reelLink" placeholder="Paste Reel Link Here...">
        <button class="download-btn" id="mainBtn" onclick="fetchVideo()">DOWNLOAD NOW</button>
        
        <div class="loader" id="loader"></div>

        <div id="result">
            <p style="color: #00ff00; font-size: 14px;">✓ Video Found!</p>
            <a id="finalLink" href="#" target="_blank" download="reel.mp4">
                <button class="download-btn" style="background: #fff; color: #000;">SAVE TO GALLERY</button>
            </a>
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('reelLink').value;
            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');

            if(!url.includes("instagram.com")) {
                alert("Bhai sahi link dalo!");
                return;
            }

            // UI Changes
            btn.style.display = 'none';
            loader.style.display = 'block';
            result.style.display = 'none';

            try {
                // Ye ek backup server hai, agar ye bhi down ho toh RapidAPI use karni padegi
                const response = await fetch(`https://api.snapany.com/api/v1/ig/download?url=${url}`);
                const data = await response.json();

                if(data && data.url) {
                    document.getElementById('finalLink').href = data.url;
                    result.style.display = 'block';
                } else {
                    throw new Error("API Limit reached");
                }
            } catch (err) {
                alert("Server Down! Hum RapidAPI par shift ho rahe hain...");
                // Alternate method logic yahan aayega
            } finally {
                loader.style.display = 'none';
                btn.style.display = 'block';
            }
        }
    </script>
</body>
</html>
